name: Publish Docker Images

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
    types:
      - synchronize

permissions:
  contents: read

jobs:
  publish:
    name: Build and Push backend images
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      DOCKERHUB_USERNAME: ${{ secrets['LITEMERGE_DOCKERHUB_USERNAME'] || secrets['DOCKERHUB_USERNAME'] }}
      DOCKERHUB_TOKEN: ${{ secrets['LITEMERGE_DOCKERHUB_TOKEN'] || secrets['DOCKERHUB_TOKEN'] }}
      DOCKERHUB_REPOSITORY: ${{ vars['DOCKERHUB_REPOSITORY'] }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub credentials
        shell: bash
        run: |
          if [[ -z "${DOCKERHUB_USERNAME}" || -z "${DOCKERHUB_TOKEN}" ]]; then
            echo "Missing Docker Hub credentials."
            echo "Set either LITEMERGE_DOCKERHUB_USERNAME/LITEMERGE_DOCKERHUB_TOKEN or DOCKERHUB_USERNAME/DOCKERHUB_TOKEN in repository secrets."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            API_TAG="backend-api-pr-${{ github.event.pull_request.number }}"
            WORKER_TAG="backend-worker-pr-${{ github.event.pull_request.number }}"
          else
            BUILD_NUMBER=$((1000 + GITHUB_RUN_NUMBER))
            API_TAG="backend-api_${BUILD_NUMBER}"
            WORKER_TAG="backend-worker_${BUILD_NUMBER}"
          fi

          REPOSITORY="${DOCKERHUB_REPOSITORY:-litemerge}"

          echo "repository=${REPOSITORY}" >> "${GITHUB_OUTPUT}"
          echo "api_tag=${API_TAG}" >> "${GITHUB_OUTPUT}"
          echo "worker_tag=${WORKER_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.repository }}:${{ steps.tags.outputs.api_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.repository }}:${{ steps.tags.outputs.worker_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        shell: bash
        run: |
          echo "Pushed ${DOCKERHUB_REPOSITORY:-litemerge}:${{ steps.tags.outputs.api_tag }}"
          echo "Pushed ${DOCKERHUB_REPOSITORY:-litemerge}:${{ steps.tags.outputs.worker_tag }}"