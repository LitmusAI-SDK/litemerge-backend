services:
  api:
    build:
      context: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8080 --reload
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      - redis

  worker:
    build:
      context: .
    command: celery -A worker.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Local MongoDB — only started when the "local" profile is active.
  # Atlas mode (default): docker compose up --build
  # Local mode:           docker compose --profile local up --build
  mongo:
    profiles:
      - local
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
